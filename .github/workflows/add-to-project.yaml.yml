name: Add issue to Project

on:
  issues:
    types: [opened]

permissions:
  issues: write
  repository-projects: write

jobs:
  add-to-project:
    runs-on: ubuntu-latest

    steps:
      - name: Add issue to project
        uses: actions/add-to-project@v1
        with:
          project-url: https://github.com/users/Cyril234/projects/3
          github-token: ${{ secrets.GITHUB_TOKEN }}