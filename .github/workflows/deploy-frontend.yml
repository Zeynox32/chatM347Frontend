name: Build → Push → Deploy Frontend (GCP VM)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # ── 1. Prepare ────────────────────────────────────────────────────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      sha_tag: ${{ steps.tag.outputs.sha_tag }}
      owner_lower: ${{ steps.owner.outputs.owner_lower }}
    steps:
      - uses: actions/checkout@v4
      - name: Set SHA tag
        id: tag
        run: echo "sha_tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Compute lowercase owner (GHCR/Docker erfordert lowercase Image-Namen)
        id: owner
        run: echo "owner_lower=$(echo '${{ secrets.GHCR_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

  # ── 2. Build & Push Frontend ─────────────────────────────────────────────────
  build-and-push:
    name: Build & Push – frontend-service
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.owner_lower }}/chattrix-frontend-service
          tags: |
            type=raw,value=${{ needs.prepare.outputs.sha_tag }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_GATEWAY_URL=${{ secrets.PUBLIC_URL }}
            VITE_WS_URL=${{ secrets.PUBLIC_WS_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Nur das Frontend-Image auf der VM aktualisieren ───────────────────────
  deploy:
    name: Deploy Frontend to VM via SSH
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push]
    environment: prod

    env:
      SHA_TAG: ${{ needs.prepare.outputs.sha_tag }}

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VM_IP }} >> ~/.ssh/known_hosts

      - name: Update frontend image tag & redeploy
        run: |
          ssh -i ~/.ssh/id_ed25519 deploy@${{ secrets.VM_IP }} \
            "echo '${{ secrets.GITHUB_TOKEN }}' | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin && \
             cd /opt/chattrix && \
             sudo sed -i 's/^IMAGE_TAG_FRONTEND=.*/IMAGE_TAG_FRONTEND=${{ env.SHA_TAG }}/' .env && \
             sudo docker compose pull frontend-service && \
             sudo docker compose up -d frontend-service --remove-orphans && \
             sudo docker image prune -f"

      - name: Health check
        run: |
          sleep 10
          curl -f http://${{ secrets.VM_IP }}/ || echo "Health check fehlgeschlagen – bitte Logs prüfen"
